apiVersion: apps/v1
kind: Deployment
metadata:
  name: devflow-config-service
  namespace: devflow-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: devflow-config-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devflow-config-service
    spec:
      imagePullSecrets:
        - name: aliyun-docker-config
      containers:
        - name: devflow-config-service
          image: registry.cn-hangzhou.aliyuncs.com/devflow/devflow-config-service:staging
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: config
              mountPath: /etc/devflow/config/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: config-service-config
